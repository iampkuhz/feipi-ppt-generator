version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    groups:
      typescript-tooling:
        patterns:
          - typescript
          - typescript-eslint
          - "@typescript-eslint/*"
      linting:
        patterns:
          - eslint
          - "@eslint/*"
      testing:
        patterns:
          - vitest
          - "@vitest/*"
    open-pull-requests-limit: 5
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      github-actions:
        patterns:
          - "*"
